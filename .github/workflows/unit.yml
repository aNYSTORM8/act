name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          # Add your test command here, e.g. pytest
          echo "No tests defined"

      - name: Build Docker image
        run: |
          docker build -t actions-app .

      - name: Run Docker container and show traffmonetizer output
        run: |
          docker run --rm actions-app

      - name: Push Docker image (optional)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Add Docker push commands here if needed"

      - name: Deploy (optional)
        run: |
          echo "Add deployment steps here if needed"
